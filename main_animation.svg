<svg width="244" height="370" viewBox="0 0 244 370" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .phone {
        animation: phoneAnim 3.6s ease-in-out infinite;
      }
      @keyframes phoneAnim {
        0%   { transform: translateY(0px); }
        28%  { transform: translateY(73px); }
        62%  { transform: translateY(73px); }
        90%  { transform: translateY(0px); }
        100% { transform: translateY(0px); }
      }
      .flash {
        opacity: 0;
        animation: flashAnim 3.6s infinite;
      }
      @keyframes flashAnim {
        0%,  29%  { opacity: 0; }
        32%       { opacity: 1; }
        35%       { opacity: 0; }
        39%       { opacity: 1; }
        42%       { opacity: 0; }
        46%       { opacity: 1; }
        49%       { opacity: 0; }
        100%      { opacity: 0; }
      }
    </style>
